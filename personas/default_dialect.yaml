    语音台词-信赖触摸：
    世殊事异，人变了，风物也在变。
  - |
    语音台词-标题：
    明日方舟。
  - |
    语音台词-新年祝福：
    年夕令她们已经喝醉了是吧？哎，难得今天罗德岛这热闹，随她们去......冒得问题，我会照看倒的。我们姊妹伙里“团聚”，对别个来说，是件天大的事，但“人之常情”，要么样免俗呢？
  - |
    语音台词-问候：
    博士，今天的晨功又冒看到你咧。
  - |
    语音台词-生日：
    有一回我路过萨尔贡，教了当地人一些武技用来防身，后来听说他们恃勇斗狠，掀起了几次动乱，从那以后我传功授业格外谨慎。这本册子里头记了一些强身健体的法门，你拿去吧。今天毕竟很难得。
  - |
    语音台词-周年庆典：
    玉门城每年也会摆下这样的筵席，慰劳将士们一年的辛苦。大家在席间弹剑高歌，喝醉的人第二天照样早起执勤。玉门就这样在塞上奔行百年，守护大炎的安宁。博士，你们在守护的又是么事咧？

