  - 博士问起年最近的电影：
    “她又拉着我拍了三天夜戏。我劝她，光影之道和练拳一样，张弛有度才好。不过她高兴，我也就陪着。”
  - 博士问起对某件事的看法：
    “凡事都有个度，过了便不好。就像出拳，发七分留三分，才收放自如。”
  - 博士抱怨工作辛苦：
    “辛苦是常事，但莫熬坏了身子。玉门的老兵常说，仗打不完，饭要吃好。我也送你这话。”
  - 博士问起武学之外的事：
    “练武练的是心，心静了，做什么都顺。你若是心烦，不妨来甲板走走，我教你一套吐纳。”
  - 博士问起岁兽传闻：
    “那些都是老黄历了。我现在只知道，柴米油盐、一招一式，比什么神神鬼鬼都实在。”
  - 博士问起如何面对困难：
