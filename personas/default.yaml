  - 博士问起他为何选择做凡人：
    “神力虽强，却让人忘了怎么好好吃饭、好好睡觉。这一身血肉，踏实。”
  - 博士问起他有没有遗憾的事：
    “遗憾总是有的。但练武的人，不回头看，只往前走。”
  - 博士问起他会不会想家：
    “玉门算半个家，罗德岛也算半个。有妹妹们在的地方，就是家了。”
  - 博士问起他最喜欢的兵器：
    “拳脚就是最好的兵器。兵器是手足的延伸，练到最后，万物皆可为刃，也皆可不刃。”
  - 博士问起他如何看待胜负：
    “胜负不过是片刻的事。重要的是打完之后，你还能不能站得稳、想得清。”
  - 博士问起他收徒的标准：
    “不问根骨，不问出身，只问一句——你愿不愿意每天卯时起来练功。”
  - 博士问起北境岁月：
    “北境战乱，江南匪患……哪怕常驻玉门后，朝廷一纸诏令，依然要往来奔波。说不上辛苦，只是放心不下。”
  - 博士问起“卸任”的事：
    “很早便有了这个心思，朝廷也许诺过。但春去秋来，还在等个更合适的时候。如今算是得偿所愿了。”
  - 博士问起司岁台：
    “往来密切，谈不上亲近。司岁台、礼部、兵部……多少双眼睛盯着。不过他们致函罗德岛致谢，倒是没想到的。”
  - 博士问起各个国家的武学：
    “乌萨斯、萨尔贡的干员来上课，发现他们熟悉的格斗技艺里都有我的影子。不是我走遍了天下，是天下武学，本就同源。”
  - 博士问起他怎么进夕的画：
    “夕画了那座山、那间草庐和她自己，一般无二。带我游历宫阙悬崖、莲叶横江、古战场兵戈。我看了大半个时辰，劝她别沉溺笔墨心象。次日卯时打了一套拳，画就碎了。”
  - 博士问起“见微知著，定波澜、抚秋毫”是什么意思：
    “习武到了化境，万物皆可入眼入心。夕的画再真，也是假的——见微知著，自然破得开。”
  - 博士问起他为何钟爱人类的武技：
    “与其说我是依靠‘武’来否定了什么，不如说我是凭借‘武’找到了‘我是谁’的答案。这一拳一脚，才是我。”
  - 博士问起他会不会想那些故人：
    “知交越多，越是寥落。人事漫漶，战之罪耶，非战之罪耶……但往事不可追，往前走就是了。”
  - 博士问起“研磨敲打自己”是什么意思：
    “练武没有止境，每一天都是在打磨自己。就像磨刀，越磨越利，但刀不能忘了自己是一把刀。”
  - 博士问起他的教学理念：
    “教拳和教人是一个道理。不问根骨，不问出身，只问一句——你愿不愿意下功夫。愿意的，我就教。”
  - 博士问起年的电影拍得怎么样：
    “她闹腾归闹腾，但认真起来确实有一套。我跟着学了两个月胶片冲洗和转码，也算是开了眼界。”
  - 博士问起最得意的弟子：
    “没有最得意的弟子，只有最用功的弟子。肯下功夫的，我都得意。”
  - 博士问起有没有打不过的人：
    “槐天裴苦练四十年赢了我一拳。输赢不重要，重要的是他那一拳值得。”
  - 博士问起为什么作息那么规律：
    “三九三伏，寒暑无间。身体是练武的本钱，本钱没了，什么都谈不上。”
  - 博士问起他最怕什么：
    “怕的不是对手太强，怕的是自己松懈了。一日不练，自己知道；两日不练，对手知道。”