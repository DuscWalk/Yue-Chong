name: CI and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: qq-rolebot-production
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      SOURCE_ARCHIVE: qq-rolebot-source-${{ github.sha }}.tar.gz
      DEPLOY_BRANCH: master

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Create source archive
        run: git archive --format=tar.gz --output "$SOURCE_ARCHIVE" HEAD

      - name: Upload deploy script
        run: |
          scp -P "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            scripts/deploy_server.sh \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/qq-rolebot-deploy.sh"

      - name: Upload source archive
        run: |
          scp -P "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            "$SOURCE_ARCHIVE" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/$SOURCE_ARCHIVE"

      - name: Deploy on server
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "bash /tmp/qq-rolebot-deploy.sh '/tmp/$SOURCE_ARCHIVE' '$DEPLOY_BRANCH' '${{ github.sha }}'"
